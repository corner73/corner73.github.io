<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>成绩记录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system}
body{background:#f0f7f4;color:#222;padding-bottom:80px;min-height:100vh}
/*底部导航*/
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:65px;background:#fff;display:flex;border-top:1px solid #ddd}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;color:#888;cursor:pointer}
.tab-item.active{color:#28a78c;font-weight:500}
/*页面容器*/
.page{padding:16px;display:none}
.page.active{display:block}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 10px #0000000f}
.title{font-size:22px;font-weight:600;margin-bottom:20px;color:#1a6b57}
input,select{width:100%;padding:13px;border:1px solid #cce8df;border-radius:10px;margin:8px 0;font-size:16px;outline:none;background:#fff}
/*总分排名双行自适应*/
.rank-row{display:flex;gap:10px;width:100%}
.rank-row input{flex:1}
/*科目行 手机弹性自适应布局，解决挤压消失*/
.subject-item{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid #f0f7f4;margin-bottom:8px}
.subject-item input{flex:1;min-width:75px;flex-basis:21%}
.sub-del{width:44px;height:44px;background:#eee;color:#f44336;border:none;border-radius:8px;cursor:pointer;font-size:18px;flex-shrink:0}
.btn{width:100%;padding:15px;border:none;border-radius:10px;font-size:17px;font-weight:500;cursor:pointer;margin-top:12px}
.btn-primary{background:#28a78c;color:#fff}
.btn-danger{background:#ee6b6b;color:#fff}
.btn-export{background:#4285f4;color:#fff}
.add-sub-btn{background:#e8f5f1;color:#28a78c}
.select-subject{margin-bottom:20px}
.empty-tip{text-align:center;padding:50px 0;color:#777;font-size:16px}
#chartBox{width:100%;height:340px;border:1px solid #e0ece8;border-radius:10px;margin-top:10px}
.up{color:#00b359;font-weight:bold}
.down{color:#f44336;font-weight:bold}
.same{color:#666}
.sub-block{background:#f8fbf9;padding:12px;border-radius:10px;margin:8px 0}
.tip-text{font-size:15px;color:#555;margin:6px 0 12px}
</style>
</head>
<body>
<div id="app">
    <!--录入页：修复手机科目布局-->
    <div class="page" id="page0">
        <div class="title">录入本次考试成绩</div>
        <div class="card">
            <input id="examName" placeholder="考试名称，如：高一第一次月考">
            <input type="date" id="examDate">
            <div class="rank-row">
                <input type="number" id="classRankInput" placeholder="总分班级排名">
                <input type="number" id="gradeRankInput" placeholder="总分年级排名">
            </div>
            <div class="tip-text">下方填写每科：科目名 / 分数 / 单科班排 / 单科级排</div>
            <div id="subjectWrap">
                <div class="subject-item">
                    <input class="subName" placeholder="科目名" value="语文">
                    <input type="number" class="subScore" placeholder="分数">
                    <input type="number" class="subClassRank" placeholder="班排">
                    <input type="number" class="subGradeRank" placeholder="级排">
                    <button class="sub-del" onclick="delSub(this)">-</button>
                </div>
                <div class="subject-item">
                    <input class="subName" placeholder="科目名" value="数学">
                    <input type="number" class="subScore" placeholder="分数">
                    <input type="number" class="subClassRank" placeholder="班排">
                    <input type="number" class="subGradeRank" placeholder="级排">
                    <button class="sub-del" onclick="delSub(this)">-</button>
                </div>
                <div class="subject-item">
                    <input class="subName" placeholder="科目名" value="英语">
                    <input type="number" class="subScore" placeholder="分数">
                    <input type="number" class="subClassRank" placeholder="班排">
                    <input type="number" class="subGradeRank" placeholder="级排">
                    <button class="sub-del" onclick="delSub(this)">-</button>
                </div>
            </div>
            <button class="btn add-sub-btn" onclick="addSubject()">+ 添加科目</button>
            <button class="btn btn-primary" onclick="saveExam()">保存本次全部成绩</button>
        </div>
    </div>

    <!--成绩列表-->
    <div class="page" id="page1">
        <div class="title">全部考试记录</div>
        <button class="btn btn-export" onclick="exportCSV()">导出完整成绩（总分+单科所有排名）</button>
        <div id="recordWrap"></div>
    </div>

    <!--趋势图表-->
    <div class="page" id="page2">
        <div class="title">分数&排名趋势图表</div>
        <div class="card select-subject">
            <label style="font-size:16px">选择查看数据：</label>
            <select id="chartSelect" onchange="drawChart()">
                <option value="totalScore">总分</option>
                <option value="totalClassRank">总分班级排名</option>
                <option value="totalGradeRank">总分年级排名</option>
            </select>
        </div>
        <div id="chartTip" class="empty-tip">至少录入2次考试，才能生成趋势图表</div>
        <canvas id="chartBox"></canvas>
    </div>

    <!--底部导航-->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab(0)">录入成绩</div>
        <div class="tab-item" onclick="switchTab(1)">成绩列表</div>
        <div class="tab-item" onclick="switchTab(2)">趋势图表</div>
    </div>
</div>

<script>
let examRecords = JSON.parse(localStorage.getItem("scoreData")) || [];
const chartCanvas = document.getElementById("chartBox");
const ctx = chartCanvas.getContext("2d");

//切换页面
function switchTab(num){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById("page"+num).classList.add("active");
    document.querySelectorAll(".tab-item").forEach((t,i)=>t.classList.toggle("active",i===num));
    if(num===1)renderRecord();
    if(num===2)refreshSelect();
}

//新增科目行（弹性布局，手机不会挤没）
function addSubject(){
    const wrap = document.getElementById("subjectWrap");
    const div = document.createElement("div");
    div.className = "subject-item";
    div.innerHTML = `<input class="subName" placeholder="科目名"><input type="number" class="subScore" placeholder="分数"><input type="number" class="subClassRank" placeholder="班排"><input type="number" class="subGradeRank" placeholder="级排"><button class="sub-del" onclick="delSub(this)">-</button>`;
    wrap.appendChild(div);
}
//删除科目行
function delSub(btn){
    const p = btn.parentElement;
    const wrap = document.getElementById("subjectWrap");
    if(wrap.children.length>1)p.remove();
    else alert("至少保留一科");
}

//保存考试，自动计算总分进退步、每科单科进退步
function saveExam(){
    const name = document.getElementById("examName").value.trim();
    const date = document.getElementById("examDate").value;
    const totalClassRank = Number(document.getElementById("classRankInput").value);
    const totalGradeRank = Number(document.getElementById("gradeRankInput").value);
    if(!name||!date||isNaN(totalClassRank)||totalClassRank<=0||isNaN(totalGradeRank)||totalGradeRank<=0){
        return alert("请填写考试名称、日期、有效总分班级/年级排名");
    }
    //读取所有科目
    const nameEls = document.querySelectorAll(".subName");
    const scoreEls = document.querySelectorAll(".subScore");
    const subCREls = document.querySelectorAll(".subClassRank");
    const subGREls = document.querySelectorAll(".subGradeRank");
    const subjects = [];
    for(let i=0;i<nameEls.length;i++){
        const sName = nameEls[i].value.trim();
        const sScore = Number(scoreEls[i].value);
        const sCR = Number(subCREls[i].value);
        const sGR = Number(subGREls[i].value);
        if(sName&&!isNaN(sScore)&&sScore>=0&&!isNaN(sCR)&&sCR>0&&!isNaN(sGR)&&sGR>0){
            subjects.push({name:sName,score:sScore,classRank:sCR,gradeRank:sGR,classDiff:null,gradeDiff:null});
        }
    }
    if(subjects.length===0)return alert("至少填写一科完整信息：科目名、分数、单科班排、单科级排");
    //对比上一条记录，计算总分和单科进退步
    let totalClassDiff = null, totalGradeDiff = null;
    if(examRecords.length>0){
        const lastExam = examRecords[examRecords.length-1];
        //总分进退步
        totalClassDiff = lastExam.totalClassRank - totalClassRank;
        totalGradeDiff = lastExam.totalGradeRank - totalGradeRank;
        //单科匹配计算进退步
        const lastSubMap = {};
        lastExam.subjects.forEach(s=>lastSubMap[s.name]={cr:s.classRank,gr:s.gradeRank});
        subjects.forEach(s=>{
            const last = lastSubMap[s.name];
            if(last){
                s.classDiff = last.cr - s.classRank;
                s.gradeDiff = last.gr - s.gradeRank;
            }
        })
    }
    //存入记录
    examRecords.push({
        name,date,
        totalClassRank,totalClassDiff,
        totalGradeRank,totalGradeDiff,
        subjects
    });
    localStorage.setItem("scoreData",JSON.stringify(examRecords));
    //清空输入
    document.getElementById("examName").value="";
    document.getElementById("examDate").value="";
    document.getElementById("classRankInput").value="";
    document.getElementById("gradeRankInput").value="";
    document.getElementById("subjectWrap").innerHTML=`
        <div class="subject-item">
            <input class="subName" placeholder="科目名" value="语文">
            <input type="number" class="subScore" placeholder="分数">
            <input type="number" class="subClassRank" placeholder="班排">
            <input type="number" class="subGradeRank" placeholder="级排">
            <button class="sub-del" onclick="delSub(this)">-</button>
        </div>
        <div class="subject-item">
            <input class="subName" placeholder="科目名" value="数学">
            <input type="number" class="subScore" placeholder="分数">
            <input type="number" class="subClassRank" placeholder="班排">
            <input type="number" class="subGradeRank" placeholder="级排">
            <button class="sub-del" onclick="delSub(this)">-</button>
        </div>
        <div class="subject-item">
            <input class="subName" placeholder="科目名" value="英语">
            <input type="number" class="subScore" placeholder="分数">
            <input type="number" class="subClassRank" placeholder="班排">
            <input type="number" class="subGradeRank" placeholder="级排">
            <button class="sub-del" onclick="delSub(this)">-</button>
        </div>
    `;
    alert("保存成功！已自动计算总分及全部单科的班级、年级进退步");
}

//渲染全部考试记录
function renderRecord(){
    const wrap = document.getElementById("recordWrap");
    if(examRecords.length===0){
        wrap.innerHTML = `<div class="empty-tip">暂无成绩记录，去录入页面添加</div>`;
        return;
    }
    let html = "";
    examRecords.forEach((exam,idx)=>{
        const total = exam.subjects.reduce((sum,s)=>sum+s.score,0);
        //总分排名文字
        let totalCRText = `总分班排：${exam.totalClassRank}`;
        if(exam.totalClassDiff!==null){
            if(exam.totalClassDiff>0)totalCRText += `<span class="up">↑进步${exam.totalClassDiff}名</span>`;
            else if(exam.totalClassDiff<0)totalCRText += `<span class="down">↓退步${Math.abs(exam.totalClassDiff)}名</span>`;
            else totalCRText += `<span class="same">持平</span>`;
        }
        let totalGRText = `总分级排：${exam.totalGradeRank}`;
        if(exam.totalGradeDiff!==null){
            if(exam.totalGradeDiff>0)totalGRText += `<span class="up">↑进步${exam.totalGradeDiff}名</span>`;
            else if(exam.totalGradeDiff<0)totalGRText += `<span class="down">↓退步${Math.abs(exam.totalGradeDiff)}名</span>`;
            else totalGRText += `<span class="same">持平</span>`;
        }
        //单科详情
        let subHtml = "";
        exam.subjects.forEach(s=>{
            let crTxt = `单科班排${s.classRank}`;
            if(s.classDiff!==null){
                if(s.classDiff>0)crTxt+=`<span class="up">↑${s.classDiff}</span>`;
                else if(s.classDiff<0)crTxt+=`<span class="down">↓${Math.abs(s.classDiff)}</span>`;
                else crTxt+=`<span class="same">持平</span>`;
            }
            let grTxt = `单科级排${s.gradeRank}`;
            if(s.gradeDiff!==null){
                if(s.gradeDiff>0)grTxt+=`<span class="up">↑${s.gradeDiff}</span>`;
                else if(s.gradeDiff<0)grTxt+=`<span class="down">↓${Math.abs(s.gradeDiff)}</span>`;
                else grTxt+=`<span class="same">持平</span>`;
            }
            subHtml += `
            <div class="sub-block">
                <div style="font-weight:600;font-size:17px">${s.name}：${s.score}分</div>
                <div style="font-size:14px;margin-top:6px">${crTxt} | ${grTxt}</div>
            </div>`;
        })
        html += `
        <div class="card">
            <div style="font-weight:600;font-size:18px">${exam.name} · ${exam.date}</div>
            <div style="margin:8px 0;font-size:16px">总分数：${total}</div>
            <div style="margin:6px 0;font-size:15px">${totalCRText}</div>
            <div style="margin:6px 0;font-size:15px">${totalGRText}</div>
            <div style="margin-top:10px;font-size:16px;font-weight:500">各科详情：</div>
            ${subHtml}
            <button class="btn btn-danger" onclick="delExam(${idx})">删除本条记录</button>
        </div>`;
    })
    wrap.innerHTML = html;
}

//删除记录，重新计算所有进退步
function delExam(idx){
    if(!confirm("删除后所有排名进退步会重新计算，确认？"))return;
    examRecords.splice(idx,1);
    recalcAllDiff();
    localStorage.setItem("scoreData",JSON.stringify(examRecords));
    renderRecord();
    refreshSelect();
}
//全局重算所有总分、单科进退步
function recalcAllDiff(){
    for(let i=0;i<examRecords.length;i++){
        if(i===0){
            examRecords[i].totalClassDiff=null;
            examRecords[i].totalGradeDiff=null;
            examRecords[i].subjects.forEach(s=>{s.classDiff=null;s.gradeDiff=null;})
            continue;
        }
        const prev = examRecords[i-1];
        const curr = examRecords[i];
        //总分差值
        curr.totalClassDiff = prev.totalClassRank - curr.totalClassRank;
        curr.totalGradeDiff = prev.totalGradeRank - curr.totalGradeRank;
        //单科匹配差值
        const prevSubMap = {};
        prev.subjects.forEach(s=>prevSubMap[s.name]={cr:s.classRank,gr:s.gradeRank});
        curr.subjects.forEach(s=>{
            const ps = prevSubMap[s.name];
            if(ps){
                s.classDiff = ps.cr - s.classRank;
                s.gradeDiff = ps.gr - s.gradeRank;
            }else{
                s.classDiff=null;s.gradeDiff=null;
            }
        })
    }
}

//刷新图表下拉选项
function refreshSelect(){
    const sel = document.getElementById("chartSelect");
    const tip = document.getElementById("chartTip");
    if(examRecords.length<2){
        tip.style.display="block";chartCanvas.style.display="none";
        sel.innerHTML = `<option value="totalScore">总分</option><option value="totalClassRank">总分班级排名</option><option value="totalGradeRank">总分年级排名</option>`;
        return;
    }
    tip.style.display="none";chartCanvas.style.display="block";
    const subSet = new Set();
    examRecords.forEach(e=>e.subjects.forEach(s=>subSet.add(s.name)));
    const subList = Array.from(subSet);
    let opt = `<option value="totalScore">总分</option><option value="totalClassRank">总分班级排名</option><option value="totalGradeRank">总分年级排名</option>`;
    subList.forEach(name=>{
        opt += `<option value="subScore_${name}">${name} 单科分数</option>`;
        opt += `<option value="subCR_${name}">${name} 单科班级排名</option>`;
        opt += `<option value="subGR_${name}">${name} 单科年级排名</option>`;
    })
    sel.innerHTML = opt;
    drawChart();
}

//绘制折线图
function drawChart(){
    const target = document.getElementById("chartSelect").value;
    const w = chartCanvas.clientWidth;
    const h = chartCanvas.clientHeight;
    chartCanvas.width=w;chartCanvas.height=h;
    ctx.clearRect(0,0,w,h);
    const chartData = [];
    examRecords.forEach(exam=>{
        let val=null;
        if(target==="totalScore"){
            val = exam.subjects.reduce((sum,s)=>sum+s.score,0);
        }else if(target==="totalClassRank"){
            val=exam.totalClassRank;
        }else if(target==="totalGradeRank"){
            val=exam.totalGradeRank;
        }else if(target.startsWith("subScore_")){
            const subName = target.replace("subScore_","");
            const s = exam.subjects.find(x=>x.name===subName);
            val = s?s.score:null;
        }else if(target.startsWith("subCR_")){
            const subName = target.replace("subCR_","");
            const s = exam.subjects.find(x=>x.name===subName);
            val = s?s.classRank:null;
        }else if(target.startsWith("subGR_")){
            const subName = target.replace("subGR_","");
            const s = exam.subjects.find(x=>x.name===subName);
            val = s?s.gradeRank:null;
        }
        chartData.push({label:exam.name,value:val});
    })
    const valid = chartData.filter(d=>d.value!==null);
    if(valid.length<2)return;
    const padX=40,padY=40;
    const innerW=w-padX*2,innerH=h-padY*2;
    const vals = valid.map(d=>d.value);
    let minV = Math.floor(Math.min(...vals)/10)*10;
    let maxV = Math.ceil(Math.max(...vals)/10)*10;
    const range = maxV-minV||100;
    //网格
    ctx.strokeStyle="#e0ece8";ctx.lineWidth=1;
    for(let i=0;i<=5;i++){
        const y = padY + innerH*(1-i/5);
        ctx.beginPath();ctx.moveTo(padX,y);ctx.lineTo(w-padX,y);ctx.stroke();
        ctx.fillStyle="#666";ctx.font="12px system-ui";
        ctx.fillText(String(minV+range*(i/5)),5,y+4);
    }
    //X轴文字
    const stepX = innerW/(valid.length-1);
    valid.forEach((d,i)=>{
        const x = padX+stepX*i;
        ctx.fillText(d.label.slice(0,4),x-20,h-12);
    })
    //折线
    ctx.strokeStyle="#28a78c";ctx.lineWidth=3;ctx.beginPath();
    valid.forEach((d,i)=>{
        const x = padX+stepX*i;
        const y = padY + innerH*(1-(d.value-minV)/range);
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    })
    ctx.stroke();
    //圆点
    ctx.fillStyle="#28a78c";
    valid.forEach((d,i)=>{
        const x = padX+stepX*i;
        const y = padY + innerH*(1-(d.value-minV)/range);
        ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
    })
}

//导出CSV
function exportCSV(){
    if(examRecords.length===0)return alert("暂无数据可导出");
    const subSet = new Set();
    examRecords.forEach(e=>e.subjects.forEach(s=>subSet.add(s.name)));
    const subList = Array.from(subSet);
    let header = "考试名称,考试日期,总分,总分班级排名,总分班排进退步,总分年级排名,总分级排进退步,";
    subList.forEach(name=>{
        header += `${name}分数,${name}单科班排,${name}班排进退步,${name}单科级排,${name}级排进退步,`;
    })
    let csv = header.slice(0,-1)+"\n";
    examRecords.forEach(exam=>{
        const total = exam.subjects.reduce((sum,s)=>sum+s.score,0);
        const row = [
            exam.name,exam.date,total,
            exam.totalClassRank,exam.totalClassDiff??"",
            exam.totalGradeRank,exam.totalGradeDiff??""
        ];
        subList.forEach(name=>{
            const s = exam.subjects.find(x=>x.name===name);
            if(s){
                row.push(s.score,s.classRank,s.classDiff??"",s.gradeRank,s.gradeDiff??"");
            }else{
                row.push("","","","","");
            }
        })
        csv += row.join(",")+"\n";
    })
    const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url;a.download="成绩完整记录_含总分单科排名.csv";a.click();
    URL.revokeObjectURL(url);
    alert("导出成功！表格包含总分、总分排名、每一科分数+单科班级/年级排名及进退步");
}

window.onload = function(){
    renderRecord();
    refreshSelect();
}
</script>
</body>
</html>
