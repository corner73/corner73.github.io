<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学反馈生成器 · 教师专用</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 教学反馈生成器</h1>
            <p class="subtitle">上传学生信息和作业照片，AI 帮你生成专业的家长反馈</p>
        </header>

        <main>
            <!-- 信息输入区 -->
            <section class="input-section">
                <div class="form-group">
                    <label for="studentName">👤 学生姓名</label>
                    <input type="text" id="studentName" placeholder="例：张三" value="">
                </div>

                <div class="form-group">
                    <label for="lessonTopic">📚 本节课主题</label>
                    <input type="text" id="lessonTopic" placeholder="例：分数的加减法 / 古诗《静夜思》" value="">
                </div>

                <div class="form-group">
                    <label for="lessonContent">✏️ 学习内容与完成情况</label>
                    <textarea id="lessonContent" rows="4" placeholder="例：今天学习了分数的加减法，完成了课本第25-26页的10道练习题。学生整体掌握较好，但在通分环节容易出错..."></textarea>
                </div>

                <div class="form-group">
                    <label for="photoInput">📸 题目照片（可选，支持多张）</label>
                    <input type="file" id="photoInput" accept="image/*" multiple>
                    <small>上传学生作业或题目的照片，AI 会识别图片中的内容</small>
                </div>

                <div class="form-group">
                    <label for="extraNote">💬 补充说明（可选）</label>
                    <input type="text" id="extraNote" placeholder="例：学生今天上课注意力不够集中 / 举手发言很积极">
                </div>

                <button id="generateBtn" onclick="generateFeedback()">✨ 生成家长反馈</button>
            </section>

            <!-- 结果展示区 -->
            <section class="result-section">
                <div class="result-header">
                    <h3>📋 生成的反馈</h3>
                    <button id="copyBtn" onclick="copyFeedback()" style="display:none;">📋 复制</button>
                </div>
                <div id="feedbackResult" class="feedback-box">
                    <span class="placeholder">点击上方按钮，AI 将为你生成专业的家长反馈...</span>
                </div>
            </section>
        </main>

        <footer>
            <p>💡 提示：AI 生成的反馈仅供参考，请根据实际情况调整后发送给家长</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
